<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tutor Fisica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .btn-primary { background-color: #2563eb; border: none; font-weight: 600; border-radius: 12px; padding: 12px; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f1f5f9; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: #0f172a;">Bentornato </h2>
            <p class="text-muted">Accedi al tuo Tutor di Fisica</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} rounded-3">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">USERNAME</label>
                <input type="text" name="username" class="form-control" required placeholder="Es. mario.rossi">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">PASSWORD</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100">Entra</button>
        </form>
        <div class="text-center mt-4 text-muted small">
            Non hai un account? <a href="/register" class="text-primary fw-bold text-decoration-none">Registrati qui</a>
        </div>
    </div>
</body>
</html>
